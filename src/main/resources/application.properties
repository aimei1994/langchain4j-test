server.port=8080

openai.base-url=https://openrouter.ai/api/v1
openai.model-name=openai/gpt-oss-120b:free
openai.api-key=${API-KEY}
openai.temperature=0.2
openai.max-tokens=4096

# API key refresh TTL in seconds (10 minutes)
openai.api-key-ttl-seconds=600

agent.skills.classpath=skills

# Per-PR chat memory persistence (com.test.review.PersistentChatMemoryStore)
review.memory.storage-dir=./review-memory
# Reviewer accept/reject/edit feedback store (com.test.review.ReviewFeedbackStore)
review.feedback.store-file=./review-memory/feedback-store.json